<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>儿童远程伴学互动平台</title>
    <style>
      *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,"Noto Sans SC",sans-serif;color:#32425f;background:linear-gradient(145deg,#e7f3ff,#f6efff 55%,#fff8df);display:grid;place-items:center}.wrap{width:min(920px,90vw);text-align:center}.mark{display:grid;place-items:center;width:60px;height:60px;margin:auto;border-radius:18px;background:#fff;color:#3671ca;font-size:30px;font-weight:800;box-shadow:0 10px 30px #6684ad33}.eyebrow{color:#6f8bb5;font-size:12px;font-weight:700;letter-spacing:2px}.wrap h1{font-size:38px;margin:18px 0 8px;color:#425b83}.wrap>p{color:#7f8fa9}.roles{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:38px}.role{background:#ffffffd9;border:1px solid #fff;border-radius:22px;padding:28px 22px;text-decoration:none;color:inherit;box-shadow:0 18px 45px #607b9e1d;transition:.2s}.role:hover{transform:translateY(-5px);box-shadow:0 24px 55px #607b9e32}.role span{font-size:42px}.role h2{font-size:19px;margin:12px 0 5px}.role p{font-size:12px;color:#8b96a7;min-height:36px}.role b{display:inline-block;margin-top:12px;color:#3973ca;font-size:12px}.notice{margin-top:30px;font-size:11px;color:#98a2b1}@media(max-width:700px){.roles{grid-template-columns:1fr}.wrap{padding:35px 0}.wrap h1{font-size:28px}.role p{min-height:0}}</style>
  </head>
  <body>
    <main class="wrap">
      <div class="mark">伴</div>
      <p class="eyebrow">KIDS COMPANION LEARNING</p>
      <h1>儿童远程伴学互动平台</h1>
      <p>实时白板、课件同步、正向奖励与温和专注提醒</p>
      <section class="roles">
        <a class="role" href="/student/"><span>🌟</span><h2>我是学生</h2><p>进入温馨、有趣的伴学空间</p><b>打开学生端 →</b></a>
        <a class="role" href="/teacher/"><span>👩‍🏫</span><h2>我是教师</h2><p>创建课堂并进行实时互动教学</p><b>打开教师端 →</b></a>
        <a class="role" href="/admin/"><span>🛡️</span><h2>平台管理</h2><p>管理账号、分组与课堂记录</p><b>打开管理后台 →</b></a>
      </section>
      <p class="notice">演示环境仅用于产品体验，请勿录入真实儿童敏感信息。</p>
    </main>
  </body>
</html>
