services:
  - type: web
    name: kids-companion-platform
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run db:generate && npm run build && npm run db:push && npm run db:seed
    startCommand: npm run start -w @companion/server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: HOST
        value: 0.0.0.0
      - key: CLIENT_ORIGINS
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kids-companion-db
          property: connectionString

databases:
  - name: kids-companion-db
    plan: free
    region: singapore
    databaseName: companion
    user: companion
